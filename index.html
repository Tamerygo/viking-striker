<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Viking Striker ⚽</title>
<meta name="description" content="Viking Striker – pick your team and beat the defenders! Fly & Rush modes.">

<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#060b18;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;user-select:none;-webkit-user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;touch-action:none;border-radius:8px;box-shadow:0 0 60px rgba(40,90,200,.25)}
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
    background:rgba(6,11,24,.86);backdrop-filter:blur(6px);color:#fff;text-align:center;padding:18px;overflow-y:auto}
  .hidden{display:none!important}
  h1{font-size:33px;font-weight:900;letter-spacing:2px;text-shadow:0 3px 12px rgba(0,0,0,.7)}
  h1 .vk{color:#ffd23f}
  .tag{opacity:.7;font-size:13.5px;letter-spacing:.4px;margin-bottom:6px}
  .btn{border:0;border-radius:14px;padding:14px 34px;font-size:19px;font-weight:800;letter-spacing:1px;cursor:pointer;
    background:linear-gradient(#ffe27a,#ffc51f);color:#3a2c00;box-shadow:0 5px 0 #b8860b,0 10px 24px rgba(0,0,0,.45);transition:transform .05s}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #b8860b}
  .btn.sec{background:linear-gradient(#4a90d9,#2f6cab);color:#fff;box-shadow:0 4px 0 #1d4a79;font-size:15px;padding:11px 20px;font-weight:700}
  .btn.ghost{background:rgba(255,255,255,.1);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.45);font-size:14px;padding:10px 18px;font-weight:600}
  .modes{display:flex;gap:10px}
  .mode{border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:#fff;border-radius:16px;
    padding:11px 15px;font-size:13.5px;cursor:pointer;line-height:1.3;min-width:150px;opacity:.85}
  .mode b{font-size:17px;letter-spacing:.5px}
  .mode.sel{border-color:#ffd23f;background:rgba(255,210,63,.12);opacity:1;box-shadow:0 0 18px rgba(255,210,63,.15)}
  .lbl{font-size:11.5px;opacity:.55;margin-top:7px;text-transform:uppercase;letter-spacing:2.5px;font-weight:700}
  .flags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:368px}
  .flag{font-size:23px;padding:5px 9px;border-radius:11px;border:2px solid transparent;background:rgba(255,255,255,.06);cursor:pointer;filter:saturate(.85)}
  .flag.sel{border-color:#ffd23f;background:rgba(255,210,63,.16);filter:none;box-shadow:0 0 12px rgba(255,210,63,.25)}
  .qf{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;opacity:.95;padding:7px 10px;border-radius:11px;border:2px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;cursor:pointer}
  .flagc{display:block;border-radius:3px}
  .flag{padding:5px 6px}
  .qf:active{background:rgba(255,210,63,.18);border-color:#ffd23f}
  .big{font-size:46px;font-weight:900;color:#ffd23f;text-shadow:0 4px 16px rgba(0,0,0,.8)}
  .row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center}
  a.support{color:#ffd23f;text-decoration:none;font-size:13.5px;background:rgba(255,255,255,.08);padding:10px 18px;border-radius:12px;display:inline-block;border:1px solid rgba(255,210,63,.25)}
  .small{font-size:11.5px;opacity:.45;margin-top:6px;letter-spacing:.5px}
  #toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:#ffd23f;color:#2a2000;padding:9px 18px;border-radius:22px;font-weight:800;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="420" height="640"></canvas>

  <div id="menu" class="panel">
    <h1>⚔️ VIKING <span class="vk">STRIKER</span></h1>
    <div class="tag">Pick your team. Beat the defenders. Go viral.</div>
    <div class="modes">
      <button class="mode sel" id="mFlappy"><b>⬆️ FLY</b><br>tap to fly through the gaps</button>
      <button class="mode" id="mRunner"><b>🏃 RUSH</b><br>jump over the tackles</button>
    </div>
    <div class="lbl">⚡ Quarter-finals · quick pick</div>
    <div class="row" id="qfRow"></div>
    <div class="lbl">Your team</div>
    <div class="flags" id="myFlags"></div>
    <div class="lbl">Opponent</div>
    <div class="flags" id="opFlags"></div>
    <button class="btn" id="playBtn">▶ PLAY</button>
    <div class="small">One finger. No mercy.</div>
  </div>

  <div id="over" class="panel hidden">
    <h1 style="font-size:27px">🟨 TACKLED!</h1>
    <div class="big" id="finalScore">0</div>
    <div id="bestLine" style="font-size:15px;opacity:.85"></div>
    <div class="row">
      <button class="btn" id="againBtn" style="font-size:16px;padding:12px 24px">🔄 PLAY AGAIN</button>
      <button class="btn sec" id="shareBtn">📣 Share</button>
    </div>
    <button class="btn ghost" id="menuBtn">🏠 Menu</button>
    <a class="support" id="support" target="_blank" rel="noopener">❤️ Support the dev</a>
  </div>

  <div id="toast"></div>
</div>
